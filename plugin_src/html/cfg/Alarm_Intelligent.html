<div class="cfg_container alarm" id="IntelligentPage">
	<div class="cfg_row">
		<div class="first" id="IntelligentChDiv">
			<div class="cfg_row_left" id="IntelligentChL">Channel</div>
			<div class="cfg_row_right">
				<select class="select" id="IntelligentCh"></select>
			</div>
		</div>
		<div class="second" id="Intel_Switch_DIV">
			<div class="cfg_row_left" id="Intel_Switch">Enable</div>
			<div class="cfg_row_right">
				<input type="button" class="selectDisable" id="IntelSwitch" data=''/>
			</div>
		</div>
	</div>

	<div id="Intel_Content_div" style="position:relative;">
		<div class="cfg_row">
			<div class="cfg_row_left">
				<font id="ArithmeticL">Algorithm</font>
			</div>
			<div class="cfg_row_right">
				<select id="Arithmetic" class="select">			
				</select>
			</div>
		</div>
		<div class="cfg_row" id="TraceSwitchDiv">
			<div class="cfg_row_left">
				<font id="TraceSwitchL">Show Trace</font>
			</div>
			<div class="cfg_row_right">
				<input type="button" class="selectDisable" id="TraceSwitch" data=''/>
			</div>
		</div>
		<div class="cfg_row" id="RuleSwitchDiv">
			<div class="cfg_row_left">
				<font id="RuleSwitchL">Show Rules</font>
			</div>
			<div class="cfg_row_right">
				<input type="button" class="selectDisable" id="RuleSwitch" data=''/>
			</div>
		</div>
		<div class="cfg_row">
			<div class="split"></div>
		</div>
		<div class="cfg_row" id="RuleSetDiv">
			<div class="cfg_row_left" id="RuleSetL">Rule</div>
			<div class="cfg_row_right">
				<button id="RuleSet" class="btn" style="margin-left:0px;">Setting</button>
			</div>
		</div>
		
		<div class="cfg_row" id="LinkSetDiv">
			<div class="cfg_row_left" id="LinkSetL">Alarm linkage</div>
			<div class="cfg_row_right">
				<button id="LinkSet" class="btn" style="margin-left:0px;">Setting</button>
			</div>
		</div>
	</div>
	<div class="cfg_row">
		<div class="btn_box" style="margin-left:115px">
			<button id="IntelligentRf" class="btn">Refresh</button>
			<button id="IntelligentSV" class="btn SvBtnState">Save</button>
		</div>
	</div>
</div>
