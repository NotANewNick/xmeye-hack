<div class="cfg_container">
	<div style="width: 100%; height: 300px;">
		<div id="HDDList">
			<div class="table-responsive">
				<div class="table-head">
					<table class="table grid">
						<colgroup>
							<col style="width:16%">
							<col style="width:16%">
							<col style="width:16%">
							<col style="width:16%">
							<col style="width:16%">
							<col style="width:16%">
						</colgroup>
						<thead>
							<tr>
								<th id="Head_Index"></th>
								<th id="Head_Disk"></th>
								<th id="Head_Type"></th>
								<th id="Head_Status"></th>
								<th id="Head_Capacity"></th>
								<th id="Head_LeftCapacity"></th>
							</tr>
						</thead>
					</table>
			    </div>
			    <div class="table-content">
					<table id="HDDTable" class="table grid">
			            <colgroup>
							<col style="width:16%">
							<col style="width:16%">
							<col style="width:16%">
							<col style="width:16%">
							<col style="width:16%">
							<col style="width:16%">
			            </colgroup>
						<tbody>
			            </tbody>
			        </table>
			    </div>
			</div>
		</div>
	</div>

	<div class="cfg_row">
	    <div class="btn_box btn_box_left" id="OperatorBtn">
			<button id="HddSetReadWrite" class="btn autoWidth">Read/Write</button>
			<button id="HddSetSnapShot" class="btn autoWidth" style="display: none;">Snapshot</button>
			<button id="HddSetReadOnly" class="btn autoWidth">Read only</button>
			<button id="HddSetRedu" class="btn autoWidth">Redundant</button>
			<button id="HddClearDisk" class="btn autoWidth">Format Disk</button>
			<button id="HddRecoverError" class="btn autoWidth">Recover</button>
			<button id="HddPartition" class="btn autoWidth">Partition</button>
			<button id="HddDevAdd" class="btn autoWidth" style="display: none;">Add</button>
			<button id="HddDevDel" class="btn autoWidth" style="display: none;">Delete</button>
	    </div>
	</div>
</div>
