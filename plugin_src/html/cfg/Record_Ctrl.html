<div class="cfg_container" id="table_out" style="min-width:1040px;">
	<div id="MainBox">
		<div class="cfg_radio_box" style="float:left; margin-right:3px;">
			<div class="form-group">
				<label id="Record_Mode">Record Mode</label>
				<label id="Record_All" style="width:50px">All</label>
			</div>
			<div class="form-group">
				<label id="Main_Auto">Configuration</label>
				<span class="radioSpan"><input id="MainAll1" name="MainAll" type="radio"><label for="" >&nbsp;</label></span>
			</div>
			<div class="form-group" id="Main_ManualBox">
				<label id="Main_Manual">Manual</label>
				<span class="radioSpan"><input id="MainAll2" name="MainAll" type="radio"><label for="" >&nbsp;</label></span>
			</div>
			<div class="form-group" id="Main_StopBox">
				<label id="Main_Stop">Stop</label>
				<span class="radioSpan"><input id="MainAll3" name="MainAll" type="radio"><label for="" >&nbsp;</label></span>
			</div>
		</div>
		<div id="MainRadio_Box" style="overflow: hidden;">
		</div>
	</div>
	<div class="cfg_row" id="ExtSplitDiv">
		<div class="cfg_row_left" id="ExtTip" style="width:130px">Extra Stream</div>
		<div id="ExtSplit" style="float:left; width:620px; border-bottom:1px solid #E6E6E6; margin-top:15px">
		</div>
	</div>
	<div id="ExtBox">
		<div class="cfg_radio_box" style="float:left; margin-right:3px;">
			<div class="form-group">
				<label id="Ext_Auto">Configuration</label>
				<span class="radioSpan" style="width:50px"><input id="ExtAll1" name="ExtAll" type="radio"><label for="" >&nbsp;</label></span>
			</div>
			<div class="form-group" id="Ext_ManualBox">
				<label id="Ext_Manual">Manual</label>
				<span class="radioSpan"><input id="ExtAll2" name="ExtAll" type="radio"><label for="" >&nbsp;</label></span>
			</div>
			<div class="form-group">
				<label id="Ext_Stop">Stop</label>
				<span class="radioSpan"><input id="ExtAll3" name="ExtAll" type="radio"><label for="" >&nbsp;</label></span>
			</div>
		</div>
		<div id="ExtRadio_Box" style="overflow: hidden;">
		</div>
	</div>
    <div class="cfg_row">
        <div class="btn_box" id="mv_btn_box" style="margin-left:115px">
			<button id="RecCtrlNext" class="btn" style="display: none;">Next</button>
            <button id="RecCtrlRf" class="btn">Refresh</button>
            <button id="RecCtrlSave" class="btn SvBtnState">Save</button>
        </div>
    </div>
</div>
