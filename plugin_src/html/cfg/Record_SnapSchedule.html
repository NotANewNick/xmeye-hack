<div class="cfg_container alarm" id="SnapSchedulePage">
	<div class="cfg_row" id="Breviary_div">
		<div class="cfg_row_left" id="SnapCon_BreviaryL">缩略图</div>
		<span id="BreviarySpan" style="margin-top:6px; float:left;">
			<input type="checkbox" id="Breviary"/><label for="Breviary">&nbsp;</label>
		</span>
	</div>
    <div class="cfg_row" id="Snap_CHN_TABLE">
		<div class="cfg_row_left" id="SnapCon_channel_num">channel</div>
		<div class="cfg_row_right">
			<select class="select" id="SnapConChid"></select>
		</div>
    </div>
	
	<div id="IntervalSnap_Box">
		<div class="radio-btn-box" id="IntervalTypeDiv">
			<span>
				<input id="IntervalType" name="SnapType" type="radio"/>
				<label for="IntervalType" id="IntervalTypeL">Cycle capture</label>
			</span>
		</div>
		
		<div id="IntervalBox">
			<div class="check-btn-box" id="EmailTimeDiv">
				<span>
					<input id="IntervalEmail" type="checkbox"/>
					<label for="IntervalEmail" id="IntervalEmailL">Email</label>
				</span>
				<div id="Email_Time" style="float:left">
					<input class="inputTxt" id="EmailTime" maxlength="5"/>
					<label id="EmailSec" class="unitTip"> Sec</label>
				</div>
			</div>
			<div class="check-btn-box" id="FTPTimeDiv">
				<span>
					<input id="IntervalFTP" type="checkbox"/>
					<label for="IntervalFTP" id="IntervalFTPL">FTP</label>
				</span>
				<div id="FTP_Time" style="float:left">
					<input class="inputTxt" id="FTPTime" maxlength="5"/>
					<label id="FTPSec" class="unitTip"> Sec</label>
				</div>
			</div>
			<div class="check-btn-box" id="StorageTimeDiv">
				<span>
					<input id="IntervalSto" type="checkbox"/>
					<label for="IntervalSto" id="IntervalStoL">Image storage</label>
				</span>
				<div id="Storage_Time" style="float:left">
					<input class="inputTxt" id="StorageTime" maxlength="5"/>
					<label  class="unitTip" id="StoSec"> Sec</label>
				</div>
			</div>
		</div>
	</div>
	
	<div id="TriggerSnap_Box">
		<div class="radio-btn-box" id="TriggerSnapDiv">
			<span>
				<input id="TriggerType" name='SnapType' type='radio'/>
				<label for="TriggerType" id='TriggerTypeL'>Timed upload</label>
			</span>
		</div>
		<div id="TriggerBox">
			<div class="check-btn-box" id="TriggerEnableDiv">
				<span>
					<input id="TriggerEmail" type='checkbox'/>
					<label for="TriggerEmail" id='TriggerEmailL'>Email</label>
				</span>
				<span>
					<input id="TriggerFTP" type='checkbox'/>
					<label for="TriggerFTP" id='TriggerFTPL'>FTP</label>
				</span>
				<span>
					<input id="TriggerSto" type='checkbox'/>
					<label for="TriggerSto" id='TriggerStoL'>Image storage</label>
				</span>
			</div>
			<div class="cfg_row" id="TriggerTimeDiv" style="padding-left:100px">
				<div class="cfg_row_left" id="UploadTL">Upload time</div>
				<div class="cfg_row_right">
					<div id="Upload_Ttime" style="height: 25px; overflow: hidden; float: left;"></div>
					<button id="TriggerAdd" class="btn">Add</button>
					<button id="TriggerDel" class="btn">Del</button> 
				</div>
			</div>
			<!-- <div id="TriggerSnap_ligerGrid" style="display:none; float:left; margin-left:100px"></div> -->
			<div id="TriggerSnapDiv" style="width:100%; height:190px; position:relative">
				<div class="MaskDiv"></div>
				<div id="TriggerSnapList">
					<div class="table-responsive">
						<div class="table-head">
							<table class="table grid" style="margin-bottom:0">
								<colgroup>
									<col style="width:10%">
									<col style="width:15%">
									<col style="width:25%">
									<col style="width:25%">
									<col style="width:15%">
								</colgroup>
								<thead>
									<tr>
										<th id="Head_No"></th>
										<th id="Head_SnapTime"></th>
										<th id="Head_Email"></th>
										<th id="Head_Ftp"></th>
										<th id="Head_ImageStorage"></th>
									</tr>
								</thead>
							</table>
					    </div>
					    <div class="table-content">
							<table id="TriggerSnapTable" class="table grid">
								<colgroup>
									<col style="width:10%">
									<col style="width:15%">
									<col style="width:25%">
									<col style="width:25%">
									<col style="width:15%">
								</colgroup>
								<tbody>
								</tbody>
							</table>
					    </div>
					</div>
				</div>
			</div>
		</div>
		
	</div>

	<div class="radio-btn-box" id="CloseSnapDiv">
		<span>
			<input id="CloseType" name='SnapType' type='radio'/>
			<label for="CloseType" id='CloseL'>Closing</label>
		</span>
	</div>

    <div class="cfg_row">
		<div class="btn_box">
			<button id="SnapScheRF" class="btn">Refresh</button>
			<button id="SnapScheSave" class="btn SvBtnState">Save</button> 
		</div>
	</div>
</div>
