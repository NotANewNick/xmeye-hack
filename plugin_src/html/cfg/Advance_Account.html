<div class="cfg_container" id="UserPage" style="min-width:838px">
	<div style="width: 100%; height: 180px;">
		<div id="AccountList">
			<div class="table-responsive">
				<div class="table-head">
					<table class="table grid" style="margin-bottom:0">
						<colgroup>
							<col style="width:20%">
							<col style="width:30%">
							<col style="width:30%">
						</colgroup>
						<thead>
							<tr>
								<th id="Head_UserNo"></th>
								<th id="Head_UserName"></th>
								<th id="Head_Group"></th>
							</tr>
						</thead>
					</table>
			    </div>
			    <div class="table-content">
			        <table id="AccountTable" class="table grid">
			            <colgroup>
							<col style="width:20%">
							<col style="width:30%">
							<col style="width:30%">
						</colgroup>
						<tbody>
						</tbody>
			        </table>
			    </div>
			</div>
		</div>
	</div>
    <div class="cfg_row">
        <div class="btn_box" style="margin-left:-14px">
            <button class="btn autoWidth" id="USUsRf">Refresh</button>
			<button class="btn autoWidth" id="addUser">Add User</button>
			<button class="btn autoWidth" id="modUser">Modify User</button>
			<button class="btn autoWidth" id="delUser">Delete User</button>
            <button class="btn autoWidth" id="modPwd">Modify PW.</button>
			
        </div>
    </div>
	<div class="cfg_row">
        <div class="btn_box" style="margin:10px 0 0 -14px;">
			<button class="btn autoWidth" id="addGroup">Add Group</button>
			<button class="btn autoWidth" id="modGroup">Modify Group</button>
			<button class="btn autoWidth" id="delGroup">Delete Group</button>
			<button class="btn autoWidth" id="USSecurity" style="display: none;">Security</button>
        </div>
    </div>
</div>
