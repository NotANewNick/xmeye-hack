<div class="cfg_container">
	<div class="cfg_row">
		<div class="cfg_row_left" id="CommFuncSerial">Function</div>
		<div class="cfg_row_right">
			<select id="SelFunc" class="select"></select>
		</div>
	</div>
	<div class="cfg_row">
		<div class="cfg_row_left" id="BaudrateSerial">Baudrate</div>
		<div class="cfg_row_right">
			<select id="SelBaudrateSerial" class="select">
				<option value="1200">1200</option>
				<option value="2400">2400</option>
				<option value="4800">4800</option>
				<option value="9600">9600</option>
				<option value="19200">19200</option>
				<option value="38400">38400</option>
				<option value="57600">57600</option>
				<option value="115200">115200</option>
			</select>
		</div>
	</div>
	<div class="cfg_row">
		<div class="cfg_row_left" id="DataBitSerial">Data Bits</div>
		<div class="cfg_row_right">
			<select id="SelDataBitSerial" class="select">
				<option value="5">5</option>
				<option value="6">6</option>
				<option value="7">7</option>
				<option value="8">8</option>
			</select>
		</div>
	</div>
	<div class="cfg_row">
		<div class="cfg_row_left" id="StopBitSerial">Stop Bits</div>
		<div class="cfg_row_right">
			<select id="SelStopBitSerial" class="select">
				<option value="1">1</option>
				<option value="2">2</option>
			</select>
		</div>
	</div>
	<div class="cfg_row">
		<div class="cfg_row_left" id="ParitySerial">Parity</div>
		<div class="cfg_row_right">
			<select id="SelParitySerial" class="select"></select>
		</div>
	</div>
	<div class="cfg_row">
		<div class="btn_box">
			<button id="BtnRefreshSerial" class="btn">Refresh</button>
			<button id="BtnSaveSerial" class="btn SvBtnState">Save</button>
		</div>
	</div>
</div>
